name: munin-ai-memory
version: 1.2.0
description: Affordable persistent memory for AI agents with GraphRAG ($1.6/mo).
repository: https://github.com/3d-era/munin-for-agents
license: MIT
contact: mac@kal.vn
keywords:
  - mcp
  - memory
  - ai-agent
  - context
  - persistent-storage
  - graphrag

startCommand:
  type: stdio
  # This function tells Smithery how to generate the run command for users
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@kalera/munin-mcp-server@latest'],
      env: {
        MUNIN_API_KEY: config.apiKey,
        MUNIN_PROJECT_ID: config.projectId
      }
    })

configSchema:
  type: object
  required:
    - apiKey
    - projectId
  properties:
    apiKey:
      type: string
      description: "Your Munin API Key. Get your free cloud key at https://munin.kalera.app"
    projectId:
      type: string
      description: "Your target Context Core (Project) ID."

exampleConfig:
  apiKey: "ck_xxxxxxxxxxxx"
  projectId: "proj_xxxxxxxxxxxx"
