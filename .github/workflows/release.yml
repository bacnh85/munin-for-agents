name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Gõ tag muốn release (ví dụ: munin-cursor-v0.1.0)'
        required: true
        default: 'munin-cursor-v0.1.0'
  push:
    tags:
      - "spec-v*"
      - "munin-sdk-v*"
      - "sdk-py-v*"
      - "munin-cursor-v*"
      - "munin-claude-v*"
      - "munin-gemini-v*"
      - "munin-openclaw-v*"
      - "munin-antigravity-v*"
      - "munin-kilo-v*"
      - "munin-qwen-v*"

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Verify
        run: |
          pnpm lint && pnpm build && pnpm test
          pnpm test:contract:mock &
          echo "Waiting for mock server to start..."
          sleep 5
          pnpm test:contract

  release-routing:
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      target: ${{ steps.resolve.outputs.target }}
    steps:
      - name: Resolve package from tag
        id: resolve
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "Release tag: ${TAG}"
          case "${TAG}" in
            spec-v*) echo "target=packages/spec" >> $GITHUB_OUTPUT ;;
            munin-sdk-v*) echo "target=packages/ts-sdk" >> $GITHUB_OUTPUT ;;
            sdk-py-v*) echo "target=packages/python-sdk" >> $GITHUB_OUTPUT ;;
            munin-cursor-v*) echo "target=adapters/cursor" >> $GITHUB_OUTPUT ;;
            munin-claude-v*) echo "target=adapters/claude" >> $GITHUB_OUTPUT ;;
            munin-gemini-v*) echo "target=adapters/gemini" >> $GITHUB_OUTPUT ;;
            munin-openclaw-v*) echo "target=adapters/openclaw" >> $GITHUB_OUTPUT ;;
            munin-antigravity-v*) echo "target=adapters/antigravity" >> $GITHUB_OUTPUT ;;
            munin-kilo-v*) echo "target=adapters/kilo" >> $GITHUB_OUTPUT ;;
            munin-qwen-v*) echo "target=adapters/qwen" >> $GITHUB_OUTPUT ;;
            *) echo "Unsupported tag format"; exit 1 ;;
          esac

  publish:
    runs-on: ubuntu-latest
    needs: release-routing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Publish
        working-directory: ${{ needs.release-routing.outputs.target }}
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
