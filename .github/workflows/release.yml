name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "spec-v*"
      - "sdk-ts-v*"
      - "sdk-py-v*"
      - "adapter-cursor-v*"
      - "adapter-claude-code-v*"
      - "adapter-gemini-cli-v*"
      - "adapter-openclaw-v*"
      - "adapter-google-antigravity-v*"
      - "adapter-kilo-code-v*"
      - "adapter-qwen-code-v*"

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: munin-ecosystem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: munin-ecosystem/pnpm-lock.yaml

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Verify
        run: pnpm lint && pnpm build && pnpm test && pnpm test:contract

  release-routing:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Resolve package from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "Release tag: ${TAG}"
          case "${TAG}" in
            spec-v*) echo "target=packages/spec" >> $GITHUB_OUTPUT ;;
            sdk-ts-v*) echo "target=packages/sdk-ts" >> $GITHUB_OUTPUT ;;
            sdk-py-v*) echo "target=packages/sdk-py" >> $GITHUB_OUTPUT ;;
            adapter-cursor-v*) echo "target=adapters/cursor" >> $GITHUB_OUTPUT ;;
            adapter-claude-code-v*) echo "target=adapters/claude-code" >> $GITHUB_OUTPUT ;;
            adapter-gemini-cli-v*) echo "target=adapters/gemini-cli" >> $GITHUB_OUTPUT ;;
            adapter-openclaw-v*) echo "target=adapters/openclaw" >> $GITHUB_OUTPUT ;;
            adapter-google-antigravity-v*) echo "target=adapters/google-antigravity" >> $GITHUB_OUTPUT ;;
            adapter-kilo-code-v*) echo "target=adapters/kilo-code" >> $GITHUB_OUTPUT ;;
            adapter-qwen-code-v*) echo "target=adapters/qwen-code" >> $GITHUB_OUTPUT ;;
            *) echo "Unsupported tag format"; exit 1 ;;
          esac

      - name: Release note scaffold
        run: echo "Release routing complete (publish step to be wired per target package)"
