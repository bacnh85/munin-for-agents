name: Plugin Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag muốn release (ví dụ: v1.0.0)'
        required: true
        default: 'v1.0.0'
  push:
    tags:
      # Tag format: munin-claude-v1.2.5 (matches plugin version)
      - "munin-claude-v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create package.json for plugin
        run: node .github/scripts/create-plugin-pkg.js

      - name: Publish to NPM
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm publish /tmp/package.json --access public --tag latest
